idhagnbot:
  lang_name: "中文（中国）"

idhagnbot_fallback:
  error_markup_header: |-
    <span weight='heavy' size='200%'>这个要慌，问题很大</span>
    <span color='#ffffff88'>Something really bad happens. Panic!</span>
  error_markup_content: |-
    <b>IdhagnBot Next 遇到了一个内部错误。</b>
    <span color='#f5f543'>可能原因：</span>{reason}
  error_markup_group: "<span color='#29b8db'>提示：</span>群管理员可以发送 {prefix}suppress true 暂时禁用本群错误消息。"
  error_plain_content: |-
    IdhagnBot Next 遇到了一个内部错误。
    可能原因: 
  error_plain_group: "提示：群管理员可以发送 {prefix}suppress true 暂时禁用本群错误消息。"
  error_type_unknown: |-
    未知错误
    这可能是 IdhagnBot Next 的设计缺陷，请向开发者寻求帮助。
  error_type_network: |-
    网络错误
    可能是命令使用的在线 API 不稳定，或者机器人服务器的网络问题。
  error_type_manual: |-
    管理员手动触发
    如果你不是群管理员，可以忽略这个。
  error_type_large_image: |-
    图片过大
    发送的图片或链接中的图片过大。
  error_type_bilibili: |-
    B站 API 异常
    接口出现更变或者被B站风控。
  bad_command: "命令不存在、权限不足或不适用于当前上下文。"
  bad_command_suggestion: "你要找的是不是："
  im_a_bot: |-
    本帐号为机器人，请发送 {prefix}帮助 查看可用命令（可以不@）。
    发送 {prefix}禁用提示 为你禁用本提示。
  im_a_bot_suppressed: "你已禁用“本帐号为机器人”的提示，再次发送 {prefix}禁用提示 可恢复。"
  im_a_bot_restored: "你已恢复“本帐号为机器人”的提示。"
  error_suppressed: "本群错误消息已禁用 24 小时。"
  error_restored: "本群错误消息已恢复。"
  error_suppress_usage: |-
    {prefix}suppress true - 暂时禁用本群错误消息。
    {prefix}suppress false - 恢复本群错误消息。
  error_raise_usage: "{prefix}raise confirm - 手动触发一个错误"

idhagnbot_lang:
  locale_get: "当前语言是 {lang}。"
  locale_get_unset: "未指定当前语言。"
  locale_get_force: "当前语言是 {lang}（强制应用）。"
  locale_set: "当前语言已设置为 {lang}。"
  locale_set_force: "当前语言已设置为 {lang}（强制应用）。"
  locale_set_invalid: "无效语言 {lang}。"
  locale_set_reset: "已恢复默认语言。"
