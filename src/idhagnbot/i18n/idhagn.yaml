idhagnbot:
  lang_name: "伊哈根语"
  lang_fallback: zh-CN

idhagnbot_fallback:
  error_markup_header: |-
    <span weight='heavy' size='200%'>这个要慌，问题很大</span>
    <span color='#ffffff88'>Something really bad happens. Panic!</span>
  error_markup_content: |-
    <b>伊哈根好像惹出来了大乱子。</b>
    <span color='#f5f543'>可能原因：</span>{reason}
  error_markup_group: "<span color='#29b8db'>提示：</span>群管理员可以说 {prefix}suppress true 让伊哈根在本群里暂时对乱子视而不见 uwu。"
  error_plain_content: |-
    伊哈根好像惹出来了大乱子。
    可能原因：
  error_plain_group: "提示: 群管理员可以说 {prefix}suppress true 让伊哈根在本群里暂时对乱子视而不见 uwu。"
  error_type_unknown: |-
    未知错误
    呜呜伊哈根有大麻烦了，也许我的主人能帮到你 qwq。
  error_type_network: |-
    网络错误
    也许是命令使用的在线 API 不太稳定喵，或者伊哈根遇到了一点点网络问题？
  error_type_manual: |-
    管理员手动触发
    如果你不是群管理员，放心大胆地忽略这个喵！
  error_type_large_image: |-
    图片过大
    图片太大了！也许是消息或者链接里的？反正太大了，伊哈根受不了喵！
  error_type_bilibili: |-
    B站 API 异常
    可能是人家改变了接口？还是说他们太坏了风控了伊哈根，哼。
  bad_command: "咦？好像没有这个命令，还是说你掌控不了它的力量，或者用错了地方。"
  bad_command_suggestion: "小笨蛋也许在找："
  im_a_bot: |-
    伊哈根只是一个机器人喵，你说 {prefix}帮助 就告诉你有哪些命令（可以不用@哦）。
    你说 {prefix}禁用提示 的话以后就不说这句话了喵。
  im_a_bot_suppressed: "你已禁用“本帐号为机器人”的提示，再次发送 {prefix}禁用提示 可恢复。"
  im_a_bot_restored: "你已恢复“本帐号为机器人”的提示。"
  error_suppressed: "接下来 24 小时内伊哈根出了乱子会很安静的喵。"
  error_restored: "伊哈根出了乱子会像往常一样惊慌失措喵。"
  error_suppress_usage: |-
    {prefix}suppress true - 暂时对乱子视而不见。
    {prefix}suppress false - 继续对乱子惊慌失措。
  error_raise_usage: "{prefix}raise confirm - 让伊哈根装死（倒）。"

idhagnbot_lang:
  locale_get: "伊哈根现在会说 {lang} 喵。"
  locale_get_unset: "伊哈根现在会说默认语言喵。"
  locale_get_force: "伊哈根现在会对大家说 {lang} 喵。"
  locale_set: "伊哈根以后会说 {lang} 喵。"
  locale_set_force: "伊哈根以后会对大家说 {lang} 喵。"
  locale_set_invalid: "伊哈根不会 {lang} 这门语言喵。"
  locale_set_reset: "伊哈根以后会说默认语言喵。"
